<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livro | Babel Toshokan</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <span class="logo">Babel Toshokan</span>
    <nav class="nav">
      <a href="index.html#inicio">Início</a>
      <a href="index.html#sobre">Sobre</a>
      <a href="index.html#destaques">Destaques</a>
      <a href="contato.html">Contato</a>
    </nav>
  </div>
</header>

<main>

  <p id="livro-nao-encontrado" class="container livro-nao-encontrado" hidden>
    Livro não encontrado. <a href="index.html#destaques">Voltar para o catálogo</a>.
  </p>

  <div id="conteudo-livro">

    <section class="livro-topo">
      <div class="container livro-topo-inner">
        <div id="livro-capa" class="livro-capa" role="img" aria-label=""></div>
        <div class="livro-info">
          <a href="index.html#destaques" class="livro-voltar">&larr; Voltar ao catálogo</a>
          <h1 id="livro-titulo"></h1>
          <p id="livro-genero" class="livro-genero"></p>
          <p id="livro-sinopse" class="livro-sinopse"></p>
        </div>
      </div>
    </section>

    <section class="leitor">
      <div class="container">
        <h2>Leitura</h2>
        <div class="leitor-caixa">
          <h3 id="leitor-titulo-pagina"></h3>
          <p id="leitor-texto"></p>
        </div>
        <div class="leitor-controles">
          <button id="leitor-anterior" class="btn btn-secundario" type="button">&larr; Anterior</button>
          <span id="leitor-indicador" class="leitor-indicador"></span>
          <button id="leitor-proxima" class="btn" type="button">Próxima &rarr;</button>
        </div>
      </div>
    </section>

  </div>

</main>

<footer class="footer">
  <div class="container">
    <p>Babel Toshokan &mdash; plataforma de livros e mangás.</p>
    <p>&copy; 2026 Babel Toshokan. Todos os direitos reservados.</p>
  </div>
</footer>

<script src="livros-dados.js"></script>
<script src="livro.js"></script>
</body>
</html>
